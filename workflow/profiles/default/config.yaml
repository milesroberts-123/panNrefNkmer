executor: slurm
jobs: 100000
cores: 100000

# rules to execute locally, because they're too fast to bother with cluster submission
# localrules: all_one_pops, all_two_pops, all

# use sensible defaults for your cluster
default-resources:
    slurm_account: "co_moilab"
    slurm_partition: "savio3_htc"
    slurm_qos: "savio_lowprio"
    ntasks: 1
    cpus_per_task: 1
    runtime: "60m"
    mem_mb: 0

# here only rules, which require different (more) resources:
set-resources:
    sra:
        cpus_per_task: 4
        runtime: "1440m"
    biosample:
        runtime: "1440m"
    fastp:
        runtime: "180m"
        cpus_per_task: 8
    qc_post_rm_contam:
        runtime: "180m"
        cpus_per_task: 8
    kmc_ref_db:
        runtime: "180m"
        cpus_per_task: 4
    kmc_rm_contam:
        runtime: "1440m"
        cpus_per_task: 8
    kmc: 
        runtime: "180m"
        cpus_per_task: 8
    kmc_combine_dbs:
        runtime: "180m"
        cpus_per_task: 8
    prejoin:
        runtime: "1440m"
    paste:
        runtime: "1440m"
    counting_bloom_filter:
        runtime: "180m"
        cpus_per_task: 1
    jules_psmc_subset_bam:
        runtime: "180m"
        cpus_per_task: 8

# parallelization with threads needs to be defined separately:
# threads and cpus_per_task are supposed to be synonymous for this plugin, but for some reason I need to specify them separately
set-threads:
    sra: 4
    fastp: 8
    qc_post_rm_contam: 8
    kmc: 8
    kmc_combine_dbs: 8
    kmc_ref_db: 4
    kmc_rm_contam: 8
    jules_psmc_subset_bam: 8
